<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">

    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <title>History</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
        }
    </style>
</head>

<body class="text-white px-4 py-6 sm:p-10">

    <h1 class="text-2xl sm:text-3xl mb-6">📜 History</h1>

    <div class="card p-4 sm:p-6">

        <!-- TABLE WRAPPER (IMPORTANT) -->
        <div class="overflow-x-auto">

            <table class="w-full min-w-[600px] text-left">

                <tr class="border-b">
                    <th class="p-2">Event</th>
                    <th class="p-2">Type</th>
                    <th class="p-2">Price</th>
                    <th class="p-2">Status</th>
                    <th class="p-2">Date</th>
                </tr>

                {% for h in data %}

                <tr class="border-b">

                    <td class="p-2">{{h[0]}}</td>

                    <td class="p-2">
                        {% if h[1] == "paid" %}
                        <span class="text-yellow-400">Paid</span>
                        {% else %}
                        <span class="text-green-400">Free</span>
                        {% endif %}
                    </td>

                    <td class="p-2">
                        {% if h[1] == "paid" %}
                        ₹{{h[2]}}
                        {% else %}
                        -
                        {% endif %}
                    </td>

                    <td class="p-2">
                        {% if h[3] == "done" %}
                        <span class="text-green-400">Done</span>
                        {% else %}
                        <span class="text-red-400">Pending</span>
                        {% endif %}
                    </td>

                    <td class="p-2 text-blue-300">{{h[4]}}</td>

                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

    <a href="/dashboard" class="block mt-6 bg-blue-500 px-6 py-2 rounded w-fit hover:bg-blue-700 transition">
        Back
    </a>

</body>

</html>
