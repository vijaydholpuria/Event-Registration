<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">

    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1f4037, #99f2c8);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
    </style>

</head>

<body class="flex justify-center items-center h-screen text-white">
    <button onclick="toggleDark()"
        class="fixed top-5 right-5 bg-white text-black dark:bg-black dark:text-white px-3 py-1 rounded shadow">

        🌙

    </button>

    <script>
        function toggleDark() {
            document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme",
                document.documentElement.classList.contains("dark") ? "dark" : "light"
            );
        }

        // load saved theme
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

    <div class="card p-10 w-96">

        <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

        <form action="/create_account" method="POST">

            <input type="hidden" name="email" value="{{email}}">

            <input class="w-full p-3 rounded text-black mb-4" name="name" placeholder="Full Name">

            <input class="w-full p-3 rounded text-black mb-4" name="mobile" placeholder="Mobile Number">

            <input type="password" class="w-full p-3 rounded text-black mb-4" name="password" placeholder="Password">

            <button class="bg-green-500 w-full p-3 rounded hover:bg-green-700 transition">

                Create Account

            </button>

        </form>

    </div>

</body>

</html>
