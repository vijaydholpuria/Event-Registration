<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black to-gray-800 text-white flex items-center justify-center h-screen">

    <div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl w-[350px] text-center shadow-lg">

        <h2 class="text-2xl font-bold mb-4 text-green-400">🎟 Ticket Verified</h2>

        <p class="mb-2"><b>Event:</b> {{event_name}}</p>
        <p class="mb-2"><b>Ticket ID:</b> {{ticket_id}}</p>

        <hr class="my-4 border-white/20">

        <p><b>Name:</b> {{name}}</p>
        <p><b>Email:</b> {{email}}</p>
        <p><b>Mobile:</b> {{mobile}}</p>
        <p><b>Age:</b> {{age}}</p>
        <p><b>Address:</b> {{address}}</p>

        <div class="mt-4 text-green-400 font-bold">
            ✅ Entry Allowed
        </div>

    </div>

</body>

</html>
